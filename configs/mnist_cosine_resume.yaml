output_dir: runs/exp_mnist_cosine_resume
seed: 42

# ─────────── 数据 ───────────
dataset:
  name: mnist
  batch_size: 128
  image_size: 32          
  num_workers: 4
  root: ./data

# ─────────── 模型（小型 U-Net） ───────────
model:
  in_channels: 1
  out_channels: 1
  base_channels: 64
  channel_mult: [1, 2, 2]    
  num_res_blocks: 2
  attn_resolutions: [16]      
  dropout: 0.1
  image_size: 32

# ─────────── Diffusion ───────────
diffusion:
  T: 1000
  beta_schedule: cosine
  s: 0.008

# ─────────── Optimizer ───────────
optimizer:
  lr: 2.0e-4
  weight_decay: 0.0
  warmup_steps: 1000

# ─────────── EMA ───────────
ema_decay: 0.999

# ─────────── 混合精度（可选） ───────────
mixed_precision: fp16       

# ─────────── 训练循环 ───────────
training:
  num_epochs: 50
  log_every: 50             
  sample_every: 1000        
  ckpt_every: 5000 
  grad_clip: 1.0

# ─────────── WandB（可选） ───────────
wandb:
  enabled: true            
  project: ddpm-course
  run_name: mnist_cosine_resume

# ─────────── 绘图（可选） ───────────
plotting:
  enabled: true             
  record_every: 50          
  plot_every: 1000 